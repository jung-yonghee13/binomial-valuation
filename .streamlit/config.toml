[theme]
# Valuation Suite 디자인 토큰 (design-system.md §1)
primaryColor = "#E8490F"          # --accent 오렌지
backgroundColor = "#F6F4EF"       # --bg 크림 오프화이트
secondaryBackgroundColor = "#FFFFFF"  # --surface 카드
textColor = "#1E1B16"             # --text 본문
font = "sans serif"

[server]
headless = true

[client]
# 방문자에게 개발자용 툴바(GitHub 저장소·Fork·소유자 메뉴)를 숨긴다
toolbarMode = "minimal"

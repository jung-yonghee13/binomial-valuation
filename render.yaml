# Render Blueprint — 이항모형 가치평가 엔진
# Render 대시보드에서 New → Blueprint 로 이 저장소를 선택하면 자동 구성됩니다.
# (또는 New → Web Service 로 저장소를 연결하면 Dockerfile을 자동 감지합니다.)
services:
  - type: web
    name: binomial-valuation
    runtime: docker
    plan: free
    region: singapore        # 한국에서 가장 가까운 리전 (원하면 변경 가능)
    dockerfilePath: ./Dockerfile
    autoDeploy: true          # GitHub push 시 자동 재배포
    healthCheckPath: /_stcore/health
